apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-kubernetes-operator
  labels:
    app: mongodb-kubernetes-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb-kubernetes-operator
  template:
    metadata:
      labels:
        app: mongodb-kubernetes-operator
    spec:
      serviceAccountName: mongodb-kubernetes-operator
      containers:
        - name: mongodb-kubernetes-operator
          image: quay.io/mongodb/mongodb-kubernetes-operator:0.8.3
          command:
            - /manager
          imagePullPolicy: Always
          env:
            - name: WATCH_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_NAME
              value: "mongodb-kubernetes-operator"
            - name: AGENT_IMAGE
              value: "quay.io/mongodb/mongodb-agent:107.0.9.8544-1"
            - name: VERSION_UPGRADE_HOOK_IMAGE
              value: "quay.io/mongodb/mongodb-kubernetes-operator-version-upgrade-post-start-hook:1.0.8"
            - name: READINESS_PROBE_IMAGE
              value: "quay.io/mongodb/mongodb-kubernetes-readinessprobe:1.0.19"
            - name: MONGODB_IMAGE
              value: "mongo"
            - name: MONGODB_REPO_URL
              value: "docker.io"
          resources:
            limits:
              cpu: 1100m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 200Mi
