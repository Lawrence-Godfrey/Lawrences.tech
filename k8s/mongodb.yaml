apiVersion: mongodbcommunity.mongodb.com/v1
kind: MongoDBCommunity
metadata:
  name: lawrences-tech-mongodb
  namespace: lawrences-tech
spec:
  members: 3
  type: ReplicaSet
  version: "6.0.5"
  security:
    authentication:
      modes: [ "SCRAM" ]
  users:
  - name: lawrences-tech-user
    db: lawrences_tech_db
    passwordSecretRef:
      # a reference to the secret that will be used to generate the user's password
      name: lawrences-tech-mongodb-password
      key: password
    roles:
    - name: clusterAdmin
      db: admin
    - name: userAdminAnyDatabase
      db: admin
    - name: dbOwner
      db: lawrences_tech_db
    scramCredentialsSecretName: lawrences-tech-mongodb-scram
  additionalMongodConfig:
    storage.wiredTiger.engineConfig.journalCompressor: zlib
  statefulSet:
    spec:
      template:
        spec:
          containers:
          - name: mongod
            resources:
              limits:
                cpu: "0.5"
                memory: "512Mi"
              requests:
                cpu: "0.2"
                memory: "256Mi"
          - name: mongodb-agent
            resources:
              limits:
                cpu: "0.2"
                memory: "128Mi"
              requests:
                cpu: "0.1"
                memory: "64Mi"
---
