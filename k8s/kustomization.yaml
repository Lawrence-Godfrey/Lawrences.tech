apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - configmap.yaml
  - server.yaml
  - client.yaml
  - ingress.yaml
  - mongodb-rbac.yaml
  - mongodb-operator.yaml
  - mongodb.yaml

secretGenerator:
  - name: app-secrets
    envs:
      - .env
    options:
      disableNameSuffixHash: true
  - name: mongodb-password
    literals:
      - password=localdevpassword123
    options:
      disableNameSuffixHash: true

generatorOptions:
  disableNameSuffixHash: true